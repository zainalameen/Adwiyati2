name: adwiyati
description: "Adwiyati — AI-powered medication management companion for Jordan."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.12.0

  # State management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^14.8.1

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Environment variables
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans.ttf
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans.ttf

  assets:
    - .env
    - docs/pills-solid.png
    - docs/prescription-bottle-medical-solid.png
    - docs/tablets-solid.png
